# ============================================================
# CTP SimNow 模拟盘配置
# ============================================================
#
# SimNow 是上期技术（CTP 开发商）提供的免费期货模拟交易平台。
# 注册后可获得虚拟资金，在真实行情环境下练习期货交易。
#
# 注册步骤：
#   1. 打开 https://www.simnow.com.cn
#   2. 点击"注册"，填写手机号和邮箱
#   3. 注册成功后会收到 InvestorID（投资者账号）
#   4. 使用注册的账号和密码填入下方配置
#
# 注意事项：
#   - SimNow 有两套环境，7×24小时环境可随时连接测试
#   - 交易时段环境使用真实行情数据，仅在交易时间可用
#   - 初次使用建议先用 7×24 环境验证连接
# ============================================================

gateway:
  type: "ctp"
  name: "SimNow 模拟盘"

  # ---- 账号信息（必填） ----
  broker_id: "9999"                     # SimNow 固定为 9999
  investor_id: ""                       # 填入你的 SimNow 账号
  password: ""                          # 填入你的 SimNow 密码

  # ---- 服务器地址 ----
  # 7×24 小时测试环境（推荐初次使用）
  td_address: "tcp://180.168.146.187:10130"    # 交易前置
  md_address: "tcp://180.168.146.187:10131"    # 行情前置

  # 交易时段环境（真实行情，仅交易时间可用）
  # td_address: "tcp://180.168.146.187:10201"
  # md_address: "tcp://180.168.146.187:10211"

  # ---- 认证信息 ----
  auth_code: "0000000000000000"         # SimNow 默认认证码
  app_id: "simnow_client_test"          # SimNow 默认应用ID

# ---- 常用期货合约代码参考 ----
