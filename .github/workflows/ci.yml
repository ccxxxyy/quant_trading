          from quant_trading.portfolio.manager import PortfolioManager
          from quant_trading.gateway.base import BaseGateway
          from quant_trading.gateway.simulated import SimulatedGateway
          from quant_trading.gateway.paper import PaperTradingGateway
          from quant_trading.gateway.ibkr import IBGateway
