name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v8

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra dev --extra data --extra web --extra viz

      - name: Run linter
        run: uv run ruff check src/ tests/

      - name: Run tests
        run: uv run pytest tests/ -v --tb=short

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v8

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Ruff check
        run: uv run ruff check src/ tests/

      - name: Ruff format check
        run: uv run ruff format --check src/ tests/

  import-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v8

      - name: Set up Python
        run: uv python install 3.12

      - name: Install all dependencies
        run: uv sync --extra dev --extra data --extra web --extra viz

      - name: Verify all module imports
        run: |
          uv run python -c "
          from quant_trading.core.event import EventBus, EventType
          from quant_trading.core.clock import SimulatedClock, LiveClock
          from quant_trading.core.config import Settings
          from quant_trading.core.engine import MainEngine
          from quant_trading.model.market import Tick, Bar, OrderBook
          from quant_trading.model.order import Order, Fill, OrderStatus
          from quant_trading.model.position import Position
          from quant_trading.model.account import Account
          from quant_trading.model.instrument import InstrumentId, Exchange
          from quant_trading.model.order_state import OrderStateMachine
          from quant_trading.data.engine import DataEngine
          from quant_trading.data.store import DataStore
          from quant_trading.data.pipeline import DataPipeline
          from quant_trading.data.providers.akshare import AkShareFeed
          from quant_trading.data.providers.yfinance import YFinanceFeed
          from quant_trading.backtest.engine import BacktestEngine
          from quant_trading.backtest.matching import MatchingEngine
          from quant_trading.backtest.analyzer import BacktestAnalyzer
          from quant_trading.strategy.base import BaseStrategy, BarSeriesStrategy
          from quant_trading.strategy.context import StrategyContext
